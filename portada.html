<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portada - Newton</title>
    <link rel="stylesheet" href="estilos.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="header-titulo">
        <h1>LEYES DE NEWTON</h1>
    </div>

    <div class="contenedor-principal">
        
        <aside class="panel lateral">
            <h3>FÓRMULAS</h3>
            <div class="item-info">
                <p>Segunda Ley:</p>
                <code>F = m · a</code>
            </div>
            <div class="item-info">
                <p>Peso:</p>
                <code>P = m · g</code>
            </div>
            <div class="item-info">
                <p>Aceleración:</p>
                <code>a = Δv / Δt</code>
            </div>
        </aside>

        <main class="contenedor">
            <p class="subtitulo">Elige una calculadora</p>

            <div class="opciones">
                <a href="2da_ley.html" class="card">
                    <img src="img/segunda.png" alt="2da ley">
                    <p>2da Ley de Newton</p>
                </a>

                <a href="3ra_ley.html" class="card">
                    <img src="img/tercera.png" alt="3ra ley">
                    <p>3ra Ley: Acción y Reacción</p>
                </a>
            </div>
        </main>


        <aside class="panel lateral">
            <h3>DATOS</h3>
            <div class="item-info">
                <p>Gravedad (Tierra):</p>
                <code>9.81 m/s²</code>
            </div>
            <div class="item-info">
                <p>1 Newton equivale a:</p>
                <code>1 kg·m/s²</code>
            </div>
            <div class="item-info">
                <p>Masa (m):</p>
                <code>Escalar (kg)</code>
            </div>
        </aside>

    </div>

    <footer style="margin-top: 50px; color: #666; font-size: 14px;">
        <p>© 2026 - Ingeniería en Sistemas UMG</p>
    </footer>

</body>
</html>
